name: Publish

# Publishes create-addon-cli to npm via Trusted Publishing (OIDC) — no NPM_TOKEN
# secret needed. Configure the trusted publisher once on npmjs.com:
#   package → Settings → Trusted Publisher → GitHub Actions
#     Organization/user: StaticFX   Repository: create-addon-cli
#     Workflow filename: publish.yml
# Trigger by pushing a tag like `v0.1.0`, or run manually from the Actions tab.
# The version published is whatever is in package.json — bump it before tagging.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # Exercises the real flow: clones the default template from GitHub and rebrands it.
      - name: Scaffold a smoke-test project
        run: node dist/index.js /tmp/smoke --name "Smoke Mod" --group com.acme.smoke --no-git --yes

      - name: Assert the generated project is clean
        run: |
          test -f /tmp/smoke/.gitignore \
            || { echo "::error::generated project is missing .gitignore"; exit 1; }
          test -f /tmp/smoke/src/main/java/com/acme/smoke/SmokeMod.java \
            || { echo "::error::generated project is missing its main class"; exit 1; }
          if grep -rniE 'examplemod|com\.example\.examplemod|ExampleMod' /tmp/smoke/src /tmp/smoke/gradle.properties; then
            echo "::error::residual template references left in generated project"; exit 1
          fi
          echo "Smoke test passed."

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write # OIDC token for npm Trusted Publishing (also enables provenance)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      # Node 24 ships an npm >= 11.5.1, which already supports OIDC trusted publishing.
      - run: npm ci

      - name: Skip if this version is already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Already published: $NAME@$VER — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish $NAME@$VER."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # No NODE_AUTH_TOKEN: auth comes from the OIDC trusted publisher.
      # prepack runs `tsup`, so dist/ is freshly built; provenance is automatic.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public
