name: Publish

# Publishes create-addon-cli to npm. Trigger by pushing a tag like `v0.1.0`, or run
# manually from the Actions tab. Requires a repo secret NPM_TOKEN (an npm automation
# token with publish rights). The version published is whatever is in package.json —
# bump it before tagging.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # Exercises the real flow: clones the default template from GitHub and rebrands it.
      - name: Scaffold a smoke-test project
        run: node dist/index.js /tmp/smoke --name "Smoke Mod" --group com.acme.smoke --no-git --yes

      - name: Assert the generated project is clean
        run: |
          test -f /tmp/smoke/.gitignore \
            || { echo "::error::generated project is missing .gitignore"; exit 1; }
          test -f /tmp/smoke/src/main/java/com/acme/smoke/SmokeMod.java \
            || { echo "::error::generated project is missing its main class"; exit 1; }
          if grep -rniE 'examplemod|com\.example\.examplemod|ExampleMod' /tmp/smoke/src /tmp/smoke/gradle.properties; then
            echo "::error::residual template references left in generated project"; exit 1
          fi
          echo "Smoke test passed."

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      - name: Skip if this version is already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Already published: $NAME@$VER — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish $NAME@$VER."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # prepack runs `tsup`, so dist/ is freshly built before packing.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
